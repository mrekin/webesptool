name: Build Frontend Docker Image

on:
  workflow_dispatch:  # Manual run via Gitea UI
  release:
    types: [created]  # Automatic run on release creation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      # Step 1: Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Extract version from package.json
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '"version"' frontend/package.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: v$VERSION"

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Login to Gitea Container Registry
      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.mrekin.ru
          username: ${{ gitea.actor }}
          password: ${{ gitea.token }}

      # Step 5: Build and push Docker image
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            registry.mrekin.ru/${{ github.repository_owner }}/webesptool-frontend:${{ steps.version.outputs.version }}
            registry.mrekin.ru/${{ github.repository_owner }}/webesptool-frontend:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version_number }}.${{ github.run_number }}
          cache-from: type=registry,ref=registry.mrekin.ru/${{ github.repository_owner }}/webesptool-frontend:latest
          cache-to: type=inline

      # Step 6: Logout from registry
      - name: Logout
        if: always()
        run: docker logout registry.mrekin.ru