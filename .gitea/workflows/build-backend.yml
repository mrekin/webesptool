name: Build Backend Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in vX.Y.Z format'
        required: true
        type: string
      publish_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
  release:
    types: [created]

env:
  REGISTRY: registry.mrekin.ru
  IMAGE_NAME: ${{ github.repository_owner }}/webesptool-backend

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: resolve-version
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Validate version
        run: |
          VERSION="${{ steps.resolve-version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format (expected vX.Y.Z), got: $VERSION"
            exit 1
          fi
          echo "Version format validated: $VERSION"

      - name: Compute build metadata
        id: metadata
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "app_version=${{ steps.resolve-version.outputs.version }}.$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "Build date: $BUILD_DATE"
          echo "APP_VERSION: ${{ steps.resolve-version.outputs.version }}.$BUILD_DATE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: github.event_name == 'release' || inputs.publish_image == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./webesptool
          push: ${{ github.event_name == 'release' || inputs.publish_image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ steps.metadata.outputs.app_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ (github.event_name == 'release' || inputs.publish_image) && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          provenance: false
